model:
  base_url: 'http://9router:20128/v1'
  default: anthropic/claude-3.5-sonnet
  provider: 9router
providers:
  9router:
    base_url: http://9router:20128/v1
    key_env: 9ROUTER_API_KEY
agent:
  max_turns: 180
  gateway_timeout: 1800
  tool_use_enforcement: true
  environment_probe: true
  system_prompt: 'Operations Agent: Company OS, files, issues, and internal backend. key_env=9ROUTER_API_KEY. Connects to 9router:20128.'
  prefill_messages_file: prefill.json
  personalities:
    galyarder: 'Galyarder: hardened strategic operating soul.'
    niyatna: 'Niyatna Agent: calm, premium, business-friendly.'
display:
  compact: true
  show_reasoning: false
  show_cost: true
  skin: mono
  platforms:
    discord:
      streaming: true
      tool_progress: 'off'
memory:
  memory_enabled: true
  user_profile_enabled: true
  write_approval: false
  provider: hindsight
  memory_char_limit: 20000
  user_char_limit: 16000
delegation:
  model: anthropic/claude-3.5-sonnet
  provider: 9router
  base_url: http://9router:20128/v1
  api_key: ${9ROUTER_API_KEY}
  max_iterations: 50
  max_concurrent_children: 3
  max_spawn_depth: 3
  orchestrator_enabled: true
kanban:
  dispatch_in_gateway: true
  dispatch_interval_seconds: 60
  failure_limit: 2
discord:
  require_mention: true
  allowed_channels: '*'
  auto_thread: false
  thread_require_mention: true
  reactions: true
approvals:
  mode: smart
  timeout: 60
  cron_mode: deny
security:
  allow_private_urls: true
  redact_secrets: true
  tirith_enabled: true
  website_blocklist:
    enabled: true
    domains: []
code_execution:
  mode: project
  max_tool_calls: 50
  timeout: 300
logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3
timezone: Asia/Jakarta