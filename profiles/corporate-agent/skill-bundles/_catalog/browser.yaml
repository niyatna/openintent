name: browser
mode: catalog-only-not-active-bundle
profile: corporate-agent
skill_count: 6
skills:
- name: browser-routing
  path: browser/browser-routing
  description: Use when choosing configuring or troubleshooting which browser stack should handle a task across Brave CDP
    Hermes native browser Camofox gstack Playwright BrowserOS or cloud browsers.
- name: camofox-browser
  path: browser/camofox-browser
  description: Use when working with Hermes Camofox/Camoufox browser automation, headless/headful Camofox windows, desktop
    launcher/icons, normal human Camoufox browsing, hidden browser audio, Camofox service health, YouTube/media playback,
    or the Corporate Agent profile's Camoufox browser runtime.
- name: cloakbrowser-browser
  path: browser/cloakbrowser-browser
  description: Use when installing, verifying, launching, or operating CloakBrowser on User's workstation, especially dedicated
    Agent persistent browser profiles, Google login/session capture, cookies, HAR/CDP work, or browser-profile-manager-style
    workflows.
- name: computer-use-linux
  path: browser/computer-use-linux
  description: Use when Agent needs Linux desktop observation or control through the OS-home computer-use-linux
    MCP server, including AT-SPI app trees, GNOME/Wayland window targeting, ydotool input, and Hermes MCP wiring.
- name: curl-md
  path: curl-md
  description: Fetch web pages and docs as optimized markdown with curl.md. Use when the user shares a URL, asks about
    page content, or you need to read web page or webfetch.
- name: har-capture
  path: browser/har-capture
  description: Capture network traffic (XHR, Fetch, WebSocket) from websites. Defaults to CloakBrowser/Chrome CDP for Corporate Agent/Agent;
    Playwright Chromium is explicit fallback via --standalone. Saves HAR 1.2 and extracts API endpoints.
