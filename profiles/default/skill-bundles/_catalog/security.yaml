- name: recovering-from-ransomware-attack
  path: security/recovering-from-ransomware-attack
  description: Use when executes structured recovery from a ransomware deploy following NIST and CISA frameworks, including
    environment isolation, forensic evidence preservation, clean infrastructure rebuild, prioritized system restoration from
    verified backups, credential reset, and validation against re-infection. Covers Active Directory recovery, database restoration,
    and application stack rebuild in dependency order. Activates for requests involving ransomware recovery, post-encryption
    restoration, or disaster recovery from ransomware.
- name: perseus
  path: security/perseus
  description: Use when reverse engineers malware binaries using NSA's Ghidra disassembler and decompiler to understand internal
    logic, cryptographic routines, C2 protocols, and evasion techniques at the assembly and pseudo-C level. Activates for
    requests involving malware reverse engineering, disassembly analysis, decompilation, binary analysis, or understanding
    malware internals.
- name: security-guardian
