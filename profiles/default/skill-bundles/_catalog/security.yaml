- name: perseus
  path: security/perseus
  description: Use when advanced Offensive Security & Pentesting Specialist. Use this agent for red teaming, penetration testing,
    and identifying complex security flaws. It leverages specialized security tools for XSS, SQLi, JWT, OAuth2, and network-level
    vulnerability testing.
- name: profiling-threat-actor-groups
  path: security/profiling-threat-actor-groups
  description: Use when develops comprehensive threat actor profiles for APT groups, criminal organizations, and hacktivist
    collectives by aggregating TTP documentation, historical campaign data, tooling fingerprints, and attribution indicators
    from multiple intelligence sources. Use when briefing executives on sector-specific threats, updating threat model assumptions,
    or prioritizing defensive controls against specific adversaries. Activates for requests involving MITRE ATT&CK Groups,
    Mandiant APT profiles, CrowdStrike adversary naming, or sector-specific threat briefings.
- name: perseus
  path: security/perseus
  description: Use when recover deleted files from disk images and storage media using PhotoRec's file signature-based carving
