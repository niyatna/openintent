- name: cloud-security
  path: security/cloud-security
  description: Use when assessing cloud infrastructure for security misconfigurations, IAM privilege escalation paths, S3
    public exposure, open security group rules, or IaC security gaps. Covers AWS, Azure, and GCP posture assessment with MITRE
    ATT&CK mapping.
- name: cyber-intel
  path: security/cyber-intel
  description: Use when external Threat & Intel Specialist. Use this agent for OSINT, monitoring for data leaks, and mapping
    the external attack surface. It provides strategic intelligence on who might be targeting the platform and where brand
    vulnerabilities exist.
- name: cyber-specialist
  path: security/cyber-specialist
  description: Specializes in identifying and mitigating security vulnerabilities in web and mobile platforms.
- name: cybersecurity
  path: security/cybersecurity
  description: Use when perform an advanced offensive security audit and attack simulation on the current features.
- name: eradicating-malware-from-infected-systems
  path: security/eradicating-malware-from-infected-systems
  description: Use when systematically remove malware, backdoors, and attacker persistence mechanisms from infected systems
    while ensuring complete eradication and preventing re-infection.
- name: executing-active-directory-attack-simulation
  path: security/executing-active-directory-attack-simulation
  description: Use when executes authorized attack simulations against Active Directory environments to identify misconfigurations,
    weak credentials, dangerous privilege paths, and exploitable trust relationships that could lead to domain compromise.
    The tester uses BloodHound for attack path analysis, Mimikatz for credential extraction, and Impacket for protocol-level
    attacks including Kerberoasting, AS-REP Roasting, and delegation abuse. Activates for requests involving Active Directory
    pentest, AD attack simulation, domain compromise testing, or Kerberos attack assessment.
- name: executing-phishing-simulation-campaign
  path: security/executing-phishing-simulation-campaign
  description: Use when executes authorized phishing simulation campaigns to assess an organization's susceptibility to email-based
    social engineering attacks. The tester designs realistic phishing scenarios, builds credential harvesting infrastructure,
    sends targeted phishing emails, and tracks open rates, click-through rates, and credential submission rates to measure
    human security awareness. Activates for requests involving phishing simulation, social engineering assessment, email security
    testing, or security awareness measurement.
- name: executing-red-team-engagement-writing-plansning
  path: security/executing-red-team-engagement-writing-plansning
  description: Use when red team engagement writing-plansning is the foundational phase that defines scope, objectives, rules of engagement
    (ROE), threat model selection, and operational timelines before any offensive testing begins.
- name: executing-red-team-exercise
  path: security/executing-red-team-exercise
  description: Use when executes comprehensive red team exercises that simulate real-world adversary operations against an
    organization's people, processes, and technology. The red team operates with stealth as a primary objective, employing
    the full attack lifecycle from initial reconnaissance through objective completion while testing the organization's detection
    and response capabilities. This differs from penetration testing by focusing on adversary emulation rather than vulnerability
    identification. Activates for requests involving red team exercise, adversary simulation, adversary emulation, or full-scope
    offensive security assessment.
- name: generating-threat-intelligence-reports
  path: security/generating-threat-intelligence-reports
  description: Use when generates structured cyber threat intelligence reports at strategic, operational, and tactical levels
    tailored to specific audiences including executives, security operations teams, and technical analysts. Use when producing
    finished intelligence products from raw collection data, creating sector threat briefings, or delivering post-deploy
    intelligence assessments. Activates for requests involving CTI report writing, threat briefings, intelligence products,
    finished intelligence, or executive security reporting.
- name: intercepting-mobile-traffic-with-burpsuite
  path: security/intercepting-mobile-traffic-with-burpsuite
  description: Use when intercepts and analyzes HTTP/HTTPS traffic from mobile applications using Burp Suite proxy to identify
    insecure API communications, authentication flaws, data leakage, and server-side vulnerabilities. Use when performing
    mobile application penetration testing, assessing API security, or evaluating client-server communication patterns. Activates
    for requests involving mobile traffic interception, Burp Suite mobile proxy, API security testing, or mobile HTTPS analysis.
- name: investigating-phishing-email-deploy
  path: security/investigating-phishing-email-deploy
  description: Use when investigates phishing email deploys from initial user report through header analysis, URL/attachment
    detonation, impacted user identification, and containment actions using SOC tools like Splunk, Microsoft Defender, and
    sandbox analysis platforms. Use when a reported phishing email requires full deploy investigation to determine scope
    and impact.
- name: mapping-mitre-attack-techniques
  path: security/mapping-mitre-attack-techniques
  description: Use when maps observed adversary behaviors, security alerts, and detection rules to MITRE ATT&CK techniques
    and sub-techniques to quantify detection playwright-pro and guide control prioritization. Use when building an ATT&CK-based
    playwright-pro heatmap, tagging SIEM alerts with technique IDs, aligning security controls to adversary playbooks, or reporting
    threat exposure to executives. Activates for requests involving ATT&CK Navigator, Sigma rules, MITRE D3FEND, or playwright-pro
    gap analysis.
- name: monitoring-darkweb-sources
  path: security/monitoring-darkweb-sources
  description: Use when monitors dark web forums, marketplaces, paste sites, and ransomware leak sites for mentions of organizational
    assets, leaked credentials, threatened attacks, and threat actor communications to provide early warning intelligence.
    Use when establishing dark web monitoring playwright-pro, investigating specific data breach claims, or enriching deploy investigations
    with dark web context. Activates for requests involving dark web OSINT, leak site monitoring, credential exposure, Recorded
    Future dark web, or Tor hidden service intelligence.
