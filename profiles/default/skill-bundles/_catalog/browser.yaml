name: browser
mode: catalog-only-not-active-bundle
profile: default
skill_count: 5
skills:
- name: browser-routing
  path: browser/browser-routing
  description: Configure and troubleshoot which browser stack handles web automation.
    Camofox (stealth browser) is the primary route; default Chromium is the native
    fallback.
- name: camofox-browser
  path: browser/camofox-browser
  description: Install, verify, configure, and operate the Camofox stealth browser
    (persistent profiles, cookies, headless/headed sessions).
- name: cua-driver-rs
  path: browser/cua-driver-rs
  description: "Drive a native GUI app (macOS, Windows, Linux) via the cua-driver\
    \ CLI (default) or MCP server \u2014 snapshot its accessibility tree, click/type/scroll\
    \ by element_index or pixel coords, verify via re-snapshot, all without bringing\
    \ the target to the foreground. Use when the user asks you to operate, drive,\
    \ automate, or perform a GUI task in a real application on the host."
- name: curl-md
  path: browser/curl-md
  description: Fetch web pages and docs as optimized markdown with curl.md. Use when
    the user shares a URL, asks about page content, or you need to read web page or
    webfetch.
- name: har-capture
  path: browser/har-capture
  description: Capture network traffic (XHR, Fetch, WebSocket) from websites using
    the Camofox browser agent. Saves in HAR 1.2 format.
