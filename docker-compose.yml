version: "3.8"

services:
  db:
    image: postgres:17-alpine
    container_name: openintent-db
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip_secure_password_replace_me
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - openintent-network
    restart: unless-stopped

  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: openintent-headroom
    networks:
      - openintent-network
    restart: unless-stopped

  9router:
    image: decolua/9router:latest
    container_name: openintent-9router
    ports:
      - "20128:20128"
    environment:
      NODE_ENV: production
      PORT: "20128"
      HOSTNAME: "0.0.0.0"
      DATA_DIR: /app/data
      HEADROOM_URL: http://headroom:8787
      JWT_SECRET: jwt_secret_key_random_replace_me
      INITIAL_PASSWORD: admin_password_replace_me
      API_KEY_SECRET: niyatna-9router-api-key-secret
      REQUIRE_API_KEY: "true"
      ENABLE_REQUEST_LOGS: "true"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - ./data/9router:/app/data
    depends_on:
      - headroom
    networks:
      - openintent-network
    restart: unless-stopped

  bootstrap:
    image: python:3.11-slim
    container_name: openintent-bootstrap
    entrypoint: ["/scripts/init_9router_db.py"]
    environment:
      9ROUTER_API_BASE: http://9router:20128
      9ROUTER_KEY_NAME: niyatna-agent
      9ROUTER_KEY_FILE: /data/.niyatna-9router-key
      AGENT_ENV_FILE: /data/.agent.env
    volumes:
      - ./scripts/init_9router_db.py:/scripts/init_9router_db.py:ro
      - ./data/9router:/data
    depends_on:
      - 9router
    networks:
      - openintent-network
    restart: "no"

  hindsight-api:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: openintent-hindsight
    ports:
      - "9177:8888"
    environment:
      HINDSIGHT_API_HOST: 0.0.0.0
      HINDSIGHT_API_PORT: "8888"
      HINDSIGHT_ENABLE_API: "true"
      HINDSIGHT_ENABLE_CP: "false"
      HINDSIGHT_API_LOG_LEVEL: info
      HF_HUB_VERBOSITY: error
      TRANSFORMERS_VERBOSITY: error
      TOKENIZERS_PARALLELISM: "false"
    env_file: ./data/9router/.agent.env
    volumes:
      - ./data/hindsight:/home/hindsight/.pg0
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    networks:
      - openintent-network
    restart: unless-stopped

  paperclip-hq:
    image: ghcr.io/paperclipai/paperclip:latest
    container_name: openintent-paperclip
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip_secure_password_replace_me@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_PUBLIC_URL: http://localhost:3100
      BETTER_AUTH_SECRET: better_auth_secret_key_random_replace_me
    volumes:
      - ./data/paperclip:/paperclip
    depends_on:
      db:
        condition: service_healthy
    networks:
      - openintent-network
    restart: unless-stopped

  agent-operations:
    image: nousresearch/hermes-agent:latest
    container_name: openintent-default
    entrypoint: ["/bin/bash", "-c", "npm install -g @colbymchenry/codegraph officecli @anthropic-ai/claude-code && (curl -fsSL https://d.officecli.ai/install.sh | bash) && export PATH=\"$$HOME/.local/bin:$$PATH\" && uv pip install --python /opt/hermes/.venv/bin/python3 --no-cache notebooklm-mcp-cli git+https://github.com/wizarck/paperclip-mcp.git && exec /init /opt/hermes/docker/main-wrapper.sh gateway run"]
    profiles:
      - agents
    ports:
      - "8001:8000"
    environment:
      HERMES_HOME: /opt/data
      HERMES_PROFILE: default
    env_file: ./data/9router/.agent.env
    volumes:
      - ./data/hermes:/opt/data
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      hindsight-api:
        condition: service_started
    networks:
      - openintent-network
    restart: unless-stopped

  camoufox-browser:
    image: ghcr.io/redf0x1/camofox-browser:latest
    platform: linux/amd64
    container_name: openintent-camoufox
    ports:
      - "9377:9377"
    environment:
      CAMOFOX_HOST: "0.0.0.0"
      CAMOFOX_PORT: "9377"
      CAMOFOX_AUTH_MODE: "disabled"
    volumes:
      - ./data/camoufox:/home/node/.camofox
    networks:
      - openintent-network
      
  agent-corporate:
    image: nousresearch/hermes-agent:latest
    container_name: openintent-corporate-agent
    profiles:
      - agents
    ports:
      - "8002:8000"
    command: ["gateway", "run"]
    environment:
      HERMES_HOME: /opt/data
      HERMES_PROFILE: corporate-agent
    env_file: ./data/9router/.agent.env
    volumes:
      - ./data/hermes:/opt/data
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      hindsight-api:
        condition: service_started
    networks:
      - openintent-network
    restart: unless-stopped

  agent-public:
    image: nousresearch/hermes-agent:latest
    container_name: openintent-public-agent
    profiles:
      - agents
    ports:
      - "8003:8000"
    command: ["gateway", "run"]
    environment:
      HERMES_HOME: /opt/data
      HERMES_PROFILE: public-agent
    env_file: ./data/9router/.agent.env
    volumes:
      - ./data/hermes:/opt/data
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      hindsight-api:
        condition: service_started
    networks:
      - openintent-network
    restart: unless-stopped

networks:
  openintent-network:
    name: openintent-network